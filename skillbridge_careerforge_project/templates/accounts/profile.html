<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SkillBridge & CareerForge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: #F8FAFC;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        h1 {
            margin-bottom: 30px;
            color: #1E1B4B;
        }
        .profile-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #E2E8F0;
        }
        .profile-item label {
            display: block;
            color: #7C3AED;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .profile-item p {
            color: #1E1B4B;
            font-size: 1.1rem;
        }
        a {
            color: #7C3AED;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Your Profile</h1>
        
        <div class="profile-item">
            <label>Email:</label>
            <p>{{ user.email }}</p>
        </div>
        
        <div class="profile-item">
            <label>Name:</label>
            <p>{{ user.first_name }} {{ user.last_name }}</p>
        </div>
        
        <div class="profile-item">
            <label>User Type:</label>
            <p>{{ user.user_type }}</p>
        </div>
        
        <div class="profile-item">
            <label>Member Since:</label>
            <p>{{ user.created_at }}</p>
        </div>
        
        <a href="/core/dashboard/">Back to Dashboard</a>
        <a href="/accounts/logout/" style="color: #EC4899; margin-left: 20px;">Logout</a>
    </div>
</body>
</html>
